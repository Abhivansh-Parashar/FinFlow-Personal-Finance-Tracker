server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/finflow
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# TODO: Replace with a strong secret (256-bit Base64-encoded) before production
app.jwt.secret=ZmluZmxvdy1zZWNyZXQta2V5LWZvci1kZXZlbG9wbWVudC1vbmx5LTEyMw==
app.jwt.expiration-ms=86400000

logging.level.com.financetracker=DEBUG
logging.level.org.springframework.security=INFO

app.cors.allowed-origins=http://localhost:3000

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd
