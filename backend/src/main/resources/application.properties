# ─── Server ──────────────────────────────────────────────────────────
server.port=8080

# ─── Database (MySQL) ─────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/finance_tracker?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=your_password_here
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ──────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ─── JWT ──────────────────────────────────────────────────────────────
# TODO: Replace with a strong secret (256-bit Base64-encoded) before production
app.jwt.secret=ZmluZmxvdy1zZWNyZXQta2V5LWZvci1kZXZlbG9wbWVudC1vbmx5LTEyMw==
app.jwt.expiration-ms=86400000

# ─── Logging ──────────────────────────────────────────────────────────
logging.level.com.financetracker=DEBUG
logging.level.org.springframework.security=INFO

# ─── CORS ─────────────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:3000

# ─── Jackson ──────────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd
